<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Atención Médica</title>
</head>
<body>
    <section id="body">
        <h2>Gestión de Atención Médica</h2>
         
        <button id="body_btAgregarPaciente">Agregar paciente</button>
        <hr>
        <div>
            Total de Ventas: <span id="body_lblTotalVentas">0</span>
        </div>

        <div>
           Total Procedimiento: <span id="body_lblTotalProcedimiento">0</span>
        </div>

        <div>
           Total Consulta: <span id="body_lblTotalConsulta">0</span>
        </div>

        <div>
           Total Control: <span id="body_lblTotalControl">0</span>
        </div>

        <div>
           Porcentaje Procedimiento: <span id="body_lblPorcProcedimiento">0</span>
        </div>

        <div>
           Porcentaje Consulta: <span id="body_lblPorcConsulta">0</span>
        </div>

        <div>
           Porcentaje Control: <span id="body_lblPorcControl">0</span>
        </div>

        <div>
           Porcentaje con descuento: <span id="body_lblPorcDescuentos">0</span>
        </div>


    </section>
    <hr>

    <section id="paciente" hidden style="margin-top: 20px; border: 1px solid #ccc; padding: 15px; width: 300px;">

        <h5>Procesar paciente</h5>

        <div>
            <label >Nombre
                <input type="text" id="paciente_inNombre" placeholder="Juan">
            </label>
        </div>

        <div>
            <label >Apellido
                <input type="text" id="paciente_inApellido" placeholder="Gabriel">
            </label>
        </div>

        <div>
            <label >Cédula
                <input type="number" id="paciente_inCedula" placeholder="1057696">
            </label>
        </div>

        <div>
            <label >Sexo
                <select id="paciente_inSexo">
                    <option value="" disabled selected hidden>Seleccione una opción...</option>
                    <option value="F">Femenino</option>
                    <option value="M">Masculino</option>
                </select>
            </label>
        </div>

        <div>
            <label >Fecha de nacimiento 
                <input type="date" id="paciente_inFechaNac">
            </label>
        </div>

             <div>
            <label >Tipo de Atención
                <select id="paciente_inTipoAtencion">
                    <option value="" disabled selected hidden>Seleccione una opción...</option>
                    <option value="1">Procedimiento</option>
                    <option value="2">Consulta</option>
                    <option value="3">Control</option>
                </select>
            </label>
        </div>

         <br>

         <div>
            <button id="paciente_btCancelar">Cancelar</button>
            <button id="paciente_btAceptar">Aceptar</button>

         </div>
 

    </section>

    <script type="module">
        import Cl_cPaciente from "./dist/controllers/Cl_cPaciente.js"
        import Cl_cGestionMedica from "./dist/controllers/Cl_cGestionMedica.js"
        
        import Cl_vPaciente from "./dist/views/Cl_vPaciente.js";
        import Cl_vGestionMedica from "./dist/views/Cl_vGestionMedica.js";

        const vistaPaciente = new Cl_vPaciente();        
        const vistaGestionMedica = new Cl_vGestionMedica();
        
        const controladorPaciente = new Cl_cPaciente(vistaPaciente);
        new Cl_cGestionMedica(vistaGestionMedica, controladorPaciente);
    </script>
    
</body>
</html>
